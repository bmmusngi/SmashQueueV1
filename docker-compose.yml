version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: bqm_postgres
    environment:
      POSTGRES_USER: queue_admin
      POSTGRES_PASSWORD: queue_password_123
      POSTGRES_DB: badminton_queue
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: bqm_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: bqm_backend
    environment:
      - DATABASE_URL=postgresql://queue_admin:queue_password_123@postgres:5432/badminton_queue?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: bqm_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
